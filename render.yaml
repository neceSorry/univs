services:
  - type: web
    name: university-backend
    runtime: node
    rootDir: university-backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/main
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: university-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SCHEDULER_URL
        value: https://university-scheduler.onrender.com
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production

  - type: web
    name: university-scheduler
    runtime: python
    rootDir: scheduler-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

  - type: web
    name: university-frontend
    runtime: node
    rootDir: university-frontend
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://university-backend-gkgt.onrender.com

databases:
  - name: university-postgres
    databaseName: university_db
    user: admin
    plan: free
